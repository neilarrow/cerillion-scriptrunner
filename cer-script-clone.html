<!doctype html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
  <button id="cloneBtn">Custom Clone</button>
  <pre id="debug"></pre>

  <script>
    const debug = document.getElementById("debug");

    function log(message) {
      debug.textContent += message + "\n";
    }

    log("Page loaded");

    document.getElementById("cloneBtn").addEventListener("click", function () {
      log("Button clicked");

      const paramsIn = new URLSearchParams(window.location.search);

      let issueKey = paramsIn.get("issueKey");

      if (!issueKey || issueKey.includes("{")) {
        const contextRaw = paramsIn.get("context");

        if (contextRaw) {
          const context = JSON.parse(contextRaw);
          issueKey = context.issueKey;
        }
      }

      if (!issueKey) {
          log("ERROR: Could not determine issue key");
          log("Current URL: " + window.location.href);
          return;
      }

      log("Issue key: " + issueKey);

      const jiraBaseUrl = "https://cerillion.atlassian.net";
      const targetProjectId = "10447";
      const targetIssueTypeId = "10370";
      
      const paramsOut = new URLSearchParams({
        pid: targetProjectId,
        issuetype: targetIssueTypeId,
        summary: "Clone of " + issueKey,
        description: "Cloned from " + jiraBaseUrl + "/browse/" + issueKey
      });

      const createUrl =
        jiraBaseUrl + "/secure/CreateIssueDetails!init.jspa?" + paramsOut.toString();

      log("Opening: " + createUrl);

      window.top.location.href = createUrl;
    });
  </script>
</body>
</html>
