<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Custom Clone</title>
</head>
<body>
  <button id="cloneBtn">Custom Clone</button>
  <pre id="debug"></pre>

  <script>
    const jiraBaseUrl = "https://cerillion.atlassian.net";
    const targetProjectId = "10447";
    const targetIssueTypeId = "10001";

    const debug = document.getElementById("debug");

    function log(message) {
      debug.textContent += message + "\n";
    }

    function getIssueKey() {
      const params = new URLSearchParams(window.location.search);
      const contextRaw = params.get("context");

      if (!contextRaw) {
        return null;
      }

      try {
        const context = JSON.parse(contextRaw);
        return context.issueKey || null;
      } catch (e) {
        return null;
      }
    }

    log("Loaded v10-url-only");

    document.getElementById("cloneBtn").addEventListener("click", function () {
      const issueKey = getIssueKey();

      if (!issueKey) {
        log("ERROR: Could not determine source issue key");
        return;
      }

      //const createParams = new URLSearchParams({
      //  pid: targetProjectId,
      //  issuetype: targetIssueTypeId,
      //  summary: "Clone of " + issueKey,
      //  description: "Cloned from " + jiraBaseUrl + "/browse/" + issueKey
      //});

      const createParams = new URLSearchParams({
        pid: targetProjectId,
        issuetype: targetIssueTypeId
      });
      

      const createUrl =
        jiraBaseUrl +
        "/secure/CreateIssueDetails!init.jspa?" +
        createParams.toString();

      window.top.location.href = createUrl;
    });
  </script>
</body>
</html>
