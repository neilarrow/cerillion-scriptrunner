<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Custom Clone</title>
</head>
<body>
  <button id="cloneBtn">Custom Clone</button>
  <pre id="debug"></pre>

  <script>
    const jiraBaseUrl = "https://cerillion.atlassian.net";
    const targetProjectId = "10447";
    const targetIssueTypeId = "10370";

    const debug = document.getElementById("debug");

    function log(message) {
      debug.textContent += message + "\n";
    }

    function getIssueKey() {
      const params = new URLSearchParams(window.location.search);

      const directIssueKey = params.get("issueKey");
      if (directIssueKey && !directIssueKey.includes("{")) {
        return directIssueKey;
      }

      const contextRaw = params.get("context");
      if (!contextRaw) {
        return null;
      }

      try {
        const context = JSON.parse(contextRaw);
        return context.issueKey || null;
      } catch (e) {
        log("ERROR: Could not parse context JSON");
        log(e.message);
        return null;
      }
    }

    log("Page loaded");

    document.getElementById("cloneBtn").addEventListener("click", function () {
      log("Button clicked");

      const issueKey = getIssueKey();

      if (!issueKey) {
        log("ERROR: Could not determine issue key");
        log("Current URL: " + window.location.href);
        return;
      }

      log("Issue key: " + issueKey);

      const params = new URLSearchParams({
        pid: targetProjectId,
        issuetype: targetIssueTypeId,
        summary: "Clone of " + issueKey,
        description: "Cloned from " + jiraBaseUrl + "/browse/" + issueKey
      });

      const createUrl =
        jiraBaseUrl + "/secure/CreateIssueDetails!init.jspa?" + params.toString();

      log("Opening: " + createUrl);

      window.top.location.href = createUrl;
    });
  </script>
</body>
</html>
