<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Custom Clone</title>
</head>
<body>
  <button id="cloneBtn">Custom Clone</button>
  <pre id="debug"></pre>

  <script>
    const jiraBaseUrl = "https://cerillion.atlassian.net";
    const targetProjectId = "10447";
    const targetIssueTypeId = "10001";

    const debug = document.getElementById("debug");

    function log(message) {
      debug.textContent += message + "\n";
    }

    function getIssueKey() {
      const params = new URLSearchParams(window.location.search);

      const contextRaw = params.get("context");

      if (!contextRaw) {
        return null;
      }

      try {
        const context = JSON.parse(contextRaw);
        return context.issueKey || null;
      } catch (e) {
        log("Context parse error: " + e.message);
        return null;
      }
    }

    async function getIssue(issueKey) {
      const response = await fetch(
        jiraBaseUrl +
        "/rest/api/3/issue/" +
        issueKey +
        "?fields=summary,description",
        {
          credentials: "include",
          headers: {
            "Accept": "application/json"
          }
        }
      );

      if (!response.ok) {
        throw new Error("REST call failed: " + response.status);
      }

      return await response.json();
    }

    function adfToText(adf) {
      if (!adf || !adf.content) {
        return "";
      }

      let text = "";

      function walk(node) {
        if (node.type === "text") {
          text += node.text;
        }

        if (node.type === "paragraph") {
          text += "\n";
        }

        if (node.content) {
          node.content.forEach(walk);
        }
      }

      adf.content.forEach(walk);

      return text.trim();
    }

    log("Loaded v8-dynamic-clone");

    document.getElementById("cloneBtn").addEventListener("click", async function () {

      log("Button clicked");

      try {

        const issueKey = getIssueKey();

        if (!issueKey) {
          throw new Error("Could not determine source issue key");
        }

        log("Source issue: " + issueKey);

        const issue = await getIssue(issueKey);

        const summary = issue.fields.summary || "";

        const description =
          "Cloned from " +
          jiraBaseUrl +
          "/browse/" +
          issueKey +
          "\n\n" +
          adfToText(issue.fields.description);

        const createParams = new URLSearchParams({
          pid: targetProjectId,
          issuetype: targetIssueTypeId,
          summary: summary,
          description: description
        });

        const createUrl =
          jiraBaseUrl +
          "/secure/CreateIssueDetails!init.jspa?" +
          createParams.toString();

        log("Opening URL:");
        log(createUrl);

        window.top.location.href = createUrl;

      } catch (e) {

        log("ERROR:");
        log(e.message);

      }
    });
  </script>
</body>
</html>
