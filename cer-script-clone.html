<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Custom Clone</title>
</head>
<body>
  <button id="cloneBtn">Custom Clone</button>
  <pre id="debug"></pre>

<script>
  const jiraBaseUrl = "https://cerillion.atlassian.net";
  const targetProjectId = "10447";
  const targetIssueTypeId = "10370";

  const debug = document.getElementById("debug");

  function log(message) {
    debug.textContent += message + "\n";
  }

  function getIssueKey() {
    const params = new URLSearchParams(window.location.search);
    const contextRaw = params.get("context");

    if (contextRaw) {
      const context = JSON.parse(contextRaw);
      return context.issueKey;
    }

    return null;
  }

  async function getSourceIssue(issueKey) {
    const response = await fetch(
      jiraBaseUrl + "/rest/api/3/issue/" + issueKey +
      "?fields=summary,description,priority,labels,components",
      {
        credentials: "include",
        headers: {
          "Accept": "application/json"
        }
      }
    );

    if (!response.ok) {
      throw new Error("Could not fetch source issue: " + response.status);
    }

    return await response.json();
  }

  function adfToPlainText(adf) {
    if (!adf) return "";

    let text = "";

    function walk(node) {
      if (!node) return;

      if (node.type === "text") {
        text += node.text;
      }

      if (node.type === "paragraph") {
        text += "\n";
      }

      if (node.content) {
        node.content.forEach(walk);
      }
    }

    walk(adf);
    return text.trim();
  }

  document.getElementById("cloneBtn").addEventListener("click", async function () {
    log("Button clicked");

    const issueKey = getIssueKey();

    if (!issueKey) {
      log("ERROR: Could not determine issue key");
      return;
    }

    log("Source issue: " + issueKey);

    try {
      const sourceIssue = await getSourceIssue(issueKey);
      const fields = sourceIssue.fields;

      const createParams = new URLSearchParams({
        pid: targetProjectId,
        issuetype: targetIssueTypeId,

        summary: "Clone of " + issueKey + ": " + fields.summary,

        description:
          "Cloned from " + jiraBaseUrl + "/browse/" + issueKey +
          "\n\n" +
          adfToPlainText(fields.description || ""),

        labels: (fields.labels || []).join(",")

        // Example text custom field:
        // customfield_12345: fields.customfield_12345 || ""
      });

      if (fields.priority?.id) {
        createParams.set("priority", fields.priority.id);
      }

      if (fields.components?.length) {
        createParams.set(
          "components",
          fields.components.map(c => c.id).join(",")
        );
      }

      const createUrl =
        jiraBaseUrl + "/secure/CreateIssueDetails!init.jspa?" +
        createParams.toString();

      log("Opening Create Issue");
      window.top.location.href = createUrl;

    } catch (e) {
      log("ERROR: " + e.message);
    }
  });
</script>
